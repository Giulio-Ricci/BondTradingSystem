<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Curve Signal System - Dashboard</title>
<style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
    .header {
        background: linear-gradient(135deg, #1a5c3a, #27ae60);
        color: white; padding: 20px 30px; text-align: center;
    }
    .header h1 { margin: 0; font-size: 24px; }
    .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }
    .tab-bar {
        display: flex; background: #2c3e50; padding: 0;
        border-bottom: 3px solid #1a5c3a;
    }
    .tab-btn {
        padding: 12px 20px; cursor: pointer; color: #bdc3c7;
        font-size: 13px; font-weight: bold; border: none;
        background: transparent; transition: all 0.2s;
    }
    .tab-btn:hover { background: #34495e; color: white; }
    .tab-btn.active { background: #1a5c3a; color: white; border-bottom: 3px solid #2ecc71; }
    .tab-frame {
        width: 100%; height: calc(100vh - 110px); border: none;
        background: white;
    }
</style>
</head>
<body>

<div class="header">
    <h1>Curve Signal System</h1>
    <p>Signal-Driven Strategy Selection | Slope + RR Signals | Walk-Forward Validation</p>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(event, 0)">Signal Dashboard</button>
    <button class="tab-btn" onclick="switchTab(event, 1)">Active Strategies</button>
    <button class="tab-btn" onclick="switchTab(event, 2)">Segment Performance</button>
    <button class="tab-btn" onclick="switchTab(event, 3)">System Equity</button>
    <button class="tab-btn" onclick="switchTab(event, 4)">Risk Management</button>
    <button class="tab-btn" onclick="switchTab(event, 5)">Walk-Forward</button>
</div>

<iframe id="frame0" src="tab1_signals.html" class="tab-frame" style="display:block"></iframe>
<iframe id="frame1" src="tab2_active.html" class="tab-frame" style="display:none"></iframe>
<iframe id="frame2" src="tab3_segments.html" class="tab-frame" style="display:none"></iframe>
<iframe id="frame3" src="tab4_equity.html" class="tab-frame" style="display:none"></iframe>
<iframe id="frame4" src="tab5_risk.html" class="tab-frame" style="display:none"></iframe>
<iframe id="frame5" src="tab6_walkforward.html" class="tab-frame" style="display:none"></iframe>


<script>
function switchTab(evt, idx) {
    var frames = document.querySelectorAll('.tab-frame');
    for (var i = 0; i < frames.length; i++) {
        frames[i].style.display = 'none';
    }
    var buttons = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove('active');
    }
    document.getElementById('frame' + idx).style.display = 'block';
    evt.currentTarget.classList.add('active');
}
</script>

</body>
</html>
